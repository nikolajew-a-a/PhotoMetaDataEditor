schema: spec-driven

context: |
  PhotoMetaDataEditor — desktop-приложение (Windows) для просмотра фото/видео
  и исправления их метаданных: дата съёмки и GPS-локация. В планах — Android.

  Канонические документы архитектуры (не дублировать, ссылаться):
  - ARCHITECTURE.md — слои, навигация, поток записи метаданных, DI
  - docs/architecture-diagrams.md — mermaid-схемы модулей, компонентов и классов

  Стек: Kotlin Multiplatform + Compose Multiplatform (desktop), Decompose
  (навигация/компоненты), Koin (DI), SQLDelight (SQLite-индекс и журнал правок),
  ExifTool как внешний процесс (-stay_open), Coil 3 (+ktor) для изображений
  и OSM-тайлов, собственный TileMapView для карты.

  Правила слоёв (проверяются структурой Gradle-модулей):
  - :domain — чистый Kotlin, ни одной внешней зависимости; use case на операцию
  - :data — реализации репозиториев и порты (сканер, MetadataEngine, файлы);
    платформенный код в source set desktopMain (позже androidMain)
  - :composeApp — Decompose-компоненты + тонкие Compose-функции; DI (composition
    root); порт FolderPicker
  - зависимости направлены на :domain; UI не обращается к :data напрямую (кроме di)

  Конвенции:
  - запись метаданных всегда: журнал editLog -> запись движком -> контрольное
    чтение -> обновление SQLite-индекса (UI обновляется через Flow)
  - маленькие коммиты, каждый — рабочее состояние; перед коммитом gradlew build
  - сообщения коммитов на английском, общение и артефакты — на русском
  - батч-операции сознательно отложены — не предлагать без запроса пользователя

rules:
  proposal:
    - Писать по-русски, кратко; обязательно секция «Не входит в объём» (non-goals)
    - Указывать, какие модули (:domain/:data/:composeApp) затрагиваются
  tasks:
    - Каждая задача завершается собирающимся состоянием (gradlew build зелёный)
    - Отдельной задачей — обновление ARCHITECTURE.md/диаграмм, если меняется структура
